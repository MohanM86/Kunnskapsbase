# Decap CMS Configuration for kunnskapsbase.no
# Docs: https://decapcms.org/docs/

backend:
  name: github
  repo: DITT_GITHUB_BRUKERNAVN/kunnskapsbase  # <- Endre dette!
  branch: main
  base_url: https://kunnskapsbase.no           # <- Endre til din Vercel-URL om nødvendig

# Tillat redigering uten push (local_backend for utvikling)
# local_backend: true

media_folder: public/images/uploads
public_folder: /images/uploads

# Publisering: commit direkte til main -> Vercel deployer automatisk
publish_mode: editorial_workflow  # Fjern denne linjen for å publisere direkte

collections:
  - name: domener
    label: Domener
    label_singular: Domene-artikkel
    folder: content/domener
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Tittel, name: title, widget: string }
      - { label: Beskrivelse, name: description, widget: text }
      - { label: Kategori, name: category, widget: hidden, default: Domener }
      - { label: Underkategori, name: subcategory, widget: string, required: false }
      - label: Tags
        name: tags
        widget: list
        allow_add: true
        field: { label: Tag, name: tag, widget: string }
      - { label: Oppdatert, name: updatedAt, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: Fremhevet, name: featured, widget: boolean, default: false, required: false }
      - { label: Innhold, name: body, widget: markdown }

  - name: dns
    label: DNS
